<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilocroco TV - V16 Voice Edition</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --yellow: #f1c40f; --green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 5px; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 450px; border: 4px solid var(--gold); border-radius: 15px; background: #1a1a1a; padding: 10px; min-height: 98vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 2px solid transparent; }
        .active-0 { background: rgba(52, 152, 219, 0.2); border-color: var(--blue); }
        .active-1 { background: rgba(231, 76, 60, 0.2); border-color: var(--red); }
        .active-2 { background: rgba(241, 196, 15, 0.2); border-color: var(--yellow); }
        .active-3 { background: rgba(46, 204, 113, 0.2); border-color: var(--green); }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; margin-bottom: 10px;}
        .cell { aspect-ratio: 1/1; background: #1c2833; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; position: relative; border: 1px solid #2c3e50; }
        .cell-player { border: 2px solid white; background: #234d20 !important; }
        .pion { font-size: 1.3rem; z-index: 10; }
        .is-stealth { opacity: 0.3; filter: grayscale(1); }

        /* Micro & Actions */
        .voice-controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-mic { background: #e74c3c; color: white; flex: 1; font-size: 1.2rem; }
        .btn-mic.listening { animation: pulse 1s infinite; background: #ff4757; }

        .actions-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 15px 5px; border-radius: 8px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 25px; border-radius: 20px; text-align: center; z-index: 100; width: 280px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 90; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="p-header" class="header active-0">
        <div><div id="p-name" style="font-weight:bold;">JOUEUR BLEU</div><div id="p-hp">❤️❤️❤️</div></div>
        <div id="p-votes" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">0</div>
    </div>

    <div class="voice-controls">
        <button id="mic-btn" class="btn-mic" onclick="startVoice()">🎤 PARLER À L'ANIMATEUR</button>
    </div>

    <div id="grid" class="grid"></div>

    <div id="menu-actions" class="actions-menu">
        <button style="background:#8e44ad" onclick="doAction('fouille')">🔍 Fouiller</button>
        <button style="background:#d35400" onclick="doAction('cache')">🍃 Se Cacher</button>
        <button style="background:#2c3e50" onclick="doAction('repos')">💤 Reposer</button>
        <button style="background:#27ae60" onclick="doAction('don')">🤝 Donner</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="loot-box" class="modal"><h3 id="l-title">BUTIN !</h3><div id="l-icon" style="font-size:60px;"></div><button onclick="confirmTurn()" style="background:black; color:white; width:100%; padding:12px; border-radius:10px;">OK</button></div>

<script>
    // --- MOTEUR VOCAL ---
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.pitch = 1.2; utter.rate = 1;
        synth.speak(utter);
    }

    function startVoice() {
        recognition.start();
        document.getElementById('mic-btn').classList.add('listening');
        document.getElementById('mic-btn').innerText = "JE VOUS ÉCOUTE...";
    }

    recognition.onresult = (event) => {
        const cmd = event.results[0][0].transcript.toLowerCase();
        document.getElementById('mic-btn').classList.remove('listening');
        document.getElementById('mic-btn').innerText = "🎤 PARLER À L'ANIMATEUR";
        
        if (turnStep === 1) {
            if (cmd.includes("fouille")) doAction('fouille');
            else if (cmd.includes("cache")) doAction('cache');
            else if (cmd.includes("repose") || cmd.includes("repos")) doAction('repos');
            else if (cmd.includes("donne")) doAction('don');
            else speak("Je n'ai pas compris. Dites fouiller, se cacher, se reposer ou donner.");
        } else {
            speak("Déplacez d'abord votre pion sur la grille avant de donner un ordre.");
        }
    };

    // --- LOGIQUE JEU ---
    const alphabet = "ABCDEFGHIJKL";
    let players = [
        { id: 0, name: "BLEU", picto: '👤', x: 1, y: 1, votes: 0, hp: 3, stealth: false },
        { id: 1, name: "ROUGE", picto: '👨‍🦰', x: 16, y: 1, votes: 0, hp: 3, stealth: false },
        { id: 2, name: "JAUNE", picto: '👩', x: 1, y: 12, votes: 0, hp: 3, stealth: false },
        { id: 3, name: "VERT", picto: '👨', x: 16, y: 12, votes: 0, hp: 3, stealth: false }
    ];
    let currentPlayer = 0; let turnStep = 0;
    let crocos = []; let scenery = [];

    function init() {
        for(let x=1; x<=16; x++) {
            for(let y=1; y<=12; y++) {
                if(Math.random() < 0.2) crocos.push({x,y});
                else if(Math.random() < 0.15) scenery.push({x,y, icon: '🌴', stock: 1, fruit: '🥥'});
            }
        }
        render();
        speak("Bienvenue sur Lilo Croco TV ! Joueur Bleu, c'est à vous. Choisissez votre case d'arrivée.");
    }

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const p = players[currentPlayer];
        for (let y = p.y - 3; y <= p.y + 3; y++) {
            for (let x = p.x - 3; x <= p.x + 3; x++) {
                const cell = document.createElement('div');
                if (x < 1 || x > 16 || y < 1 || y > 12) cell.className = 'cell style="visibility:hidden"';
                else {
                    cell.className = 'cell' + (x===p.x && y===p.y ? ' cell-player' : '');
                    if (crocos.some(c => c.x === x && c.y === y)) cell.innerHTML = '🐊';
                    players.forEach(pl => { if(pl.x===x && pl.y===y) cell.innerHTML += `<span class="pion ${pl.stealth?'is-stealth':''}">${pl.picto}</span>`; });
                    if(turnStep === 0) {
                        (function(tx, ty) { cell.onclick = () => { 
                            p.x = tx; p.y = ty; p.stealth = false; turnStep = 1;
                            document.getElementById('menu-actions').style.display = 'grid';
                            speak("Bien reçu. Quelle action voulez-vous faire ?");
                            render();
                        }; })(x, y);
                    }
                }
                grid.appendChild(cell);
            }
        }
    }

    function doAction(type) {
        let p = players[currentPlayer];
        if (type === 'cache') { p.stealth = true; speak("Vous vous glissez dans les fougères. Malin !"); confirmTurn(); }
        else if (type === 'repos') { speak("Un peu de repos ne fait pas de mal."); confirmTurn(); }
        else if (type === 'fouille') {
            let s = scenery.find(s => s.x === p.x && s.y === p.y);
            if(s && s.stock > 0) {
                s.stock--; speak("Bravo ! Vous avez trouvé une noix de coco !");
                document.getElementById('l-icon').innerText = '🥥';
                document.getElementById('loot-box').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            } else { speak("Il n'y a rien ici. Quel dommage pour l'audimat."); confirmTurn(); }
        } else { confirmTurn(); }
    }

    function confirmTurn() {
        document.getElementById('loot-box').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('menu-actions').style.display = 'none';
        currentPlayer = (currentPlayer + 1) % 4; turnStep = 0;
        let p = players[currentPlayer];
        document.getElementById('p-header').className = `header active-${currentPlayer}`;
        document.getElementById('p-name').innerText = `JOUEUR ${p.name}`;
        render();
        speak(`Joueur ${p.name}, à vous de jouer. Déplacez votre personnage.`);
    }

    window.onload = init;
</script>
</body>
</html>
