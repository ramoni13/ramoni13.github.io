<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilocroco TV - V6 Contrôle</title>
    <style>
        :root { --gold: #f1c40f; --bg: #121212; --danger: #e74c3c; --safe: #2ecc71; --cell-bg: #1c2833; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', sans-serif; background: #000; color: white; margin: 0; padding: 5px; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 450px; border: 3px solid var(--gold); border-radius: 15px; background: #1a1a1a; padding: 10px; display: flex; flex-direction: column; min-height: 95vh; }

        /* Header & Chrono */
        .header { display: flex; justify-content: space-between; padding: 12px; background: #000; border-radius: 8px; margin-bottom: 8px; font-weight: bold; border: 1px solid #333; }
        
        /* Bannière Événements */
        .event-banner { background: #2c3e50; border-left: 4px solid var(--gold); padding: 12px; margin-bottom: 10px; font-size: 0.85rem; min-height: 50px; display: flex; align-items: center; border-radius: 4px; color: #ecf0f1; }

        /* Grille Tactile 7x7 */
        .grid-container { background: #000; padding: 5px; border-radius: 8px; border: 1px solid #444; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        .cell { 
            aspect-ratio: 1/1; background: var(--cell-bg); border-radius: 3px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.3rem; position: relative; border: 1px solid #2c3e50;
        }
        .cell-player { border: 2px solid var(--gold); background: #1e3d23 !important; box-shadow: inset 0 0 8px var(--gold); z-index: 2; }
        .cell-coord { position: absolute; bottom: 1px; right: 1px; font-size: 0.45rem; color: #566573; }
        .cell-empty { background: transparent; border: none; }

        /* Bouton Fouille */
        .btn-fouille { width: 100%; padding: 20px; background: var(--safe); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 0 #27ae60; }
        .btn-fouille:active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }

        /* Journal de Bord (Contrôle) */
        .log-section { flex-grow: 1; background: #000; border-radius: 8px; padding: 10px; border: 1px solid #333; font-family: monospace; font-size: 0.75rem; overflow-y: auto; max-height: 150px; }
        .log-title { color: var(--gold); margin-bottom: 5px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .log-entry { border-bottom: 1px solid #222; padding: 3px 0; display: flex; justify-content: space-between; }
        .log-time { color: #555; margin-right: 5px; }

        /* Modal Butin */
        #loot-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 25px; border-radius: 20px; text-align: center; z-index: 100; box-shadow: 0 0 60px rgba(0,0,0,0.9); width: 280px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 90; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div style="color:var(--gold)">🌟 <span id="votes">0</span> VOTES</div>
        <div style="color:var(--danger)">⏳ <span id="clock">45:00</span></div>
    </div>

    <div class="event-banner">
        <div id="event-log">📢 Session de direct lancée. En attente de scan...</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <button class="btn-fouille" onclick="fouiller()">🔍 FOUILLER [ <span id="curr-pos">8:6</span> ]</button>

    <div class="log-section">
        <div class="log-title">📜 Journal de l'Émission (Contrôle)</div>
        <div id="action-history">
            </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="loot-box">
    <h3 style="margin:0">ÉLÉMENT DÉCOUVERT</h3>
    <div id="loot-icon" style="font-size:60px; margin:15px 0;">🥥</div>
    <div id="loot-name" style="font-weight:bold; font-size:1.2rem;">NOIX DE COCO</div>
    <p style="font-size: 0.8rem; color: #666;">Notez cet objet sur votre fiche de perso.</p>
    <button onclick="closeLoot()" style="margin-top:20px; background:#000; color:#fff; padding:12px; border-radius:8px; border:none; width:100%;">VALIDER</button>
</div>
