<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilocroco TV - V21.3 All Player Animations</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --yellow: #f1c40f; --green: #2ecc71; --move-bg: rgba(46, 204, 113, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 5px; display: flex; justify-content: center; }

        #start-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #start-btn { padding: 20px 40px; font-size: 1.5rem; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .app-container { width: 100%; max-width: 450px; border: 4px solid var(--gold); border-radius: 15px; background: #1a1a1a; padding: 10px; min-height: 98vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 2px solid transparent; }
        .active-0 { background: rgba(52, 152, 219, 0.2); border-color: var(--blue); }
        .active-1 { background: rgba(231, 76, 60, 0.2); border-color: var(--red); }
        .active-2 { background: rgba(241, 196, 15, 0.2); border-color: var(--yellow); }
        .active-3 { background: rgba(46, 204, 113, 0.2); border-color: var(--green); }

        .grid-container { background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        .cell { aspect-ratio: 1/1; background: #1c2833; border-radius: 4px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; font-size: 1.1rem; position: relative; border: 1px solid #2c3e50; }
        .cell-hidden { visibility: hidden; }
        .cell-player { border: 2px solid white; background: #234d20 !important; }
        .cell-reachable { background: var(--move-bg); border: 1px solid var(--green); cursor: pointer; }

        .pion { font-size: 1.3rem; z-index: 10; }
        .croco-unit { position: relative; display: flex; align-items: center; justify-content: center; }
        .croco-num { position: absolute; font-size: 0.5rem; color: white; font-weight: bold; top: -2px; background: red; border-radius: 50%; width: 10px; height: 10px; display: flex; align-items: center; justify-content: center; }
        
        .croco-blink { animation: blink-fast 0.2s step-end infinite alternate; }
        @keyframes blink-fast { 50% { opacity: 0; filter: brightness(3); } }

        .button-zone { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 5px; }
        .actions-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        button.btn-ui { padding: 12px 5px; border-radius: 8px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.65rem; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 25px; border-radius: 20px; text-align: center; z-index: 100; width: 280px; box-shadow: 0 0 100px black; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 90; }
        .cell-coord { position: absolute; bottom: 1px; right: 2px; font-size: 0.4rem; color: #555; pointer-events: none; }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color:var(--gold)">LILOCROCO TV</h1>
    <button id="start-btn" onclick="launchGame()">LANCER LE SHOW</button>
</div>

<div class="app-container">
    <div id="p-header" class="header active-0">
        <div><div id="p-name" style="font-weight:bold;">JOUEUR BLEU</div></div>
        <div id="p-votes" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">0</div>
    </div>

    <div id="deck-menu" class="button-zone">
        <button class="btn-ui" style="background:#27ae60" onclick="prepMove(3)">🏃 Déplacement</button>
        <button class="btn-ui" style="background:#d35400" onclick="prepMove(2)">😫 Fatigue</button>
        <button class="btn-ui" style="background:#c0392b" onclick="prepMove(1)">🩸 Blessure</button>
    </div>

    <div class="grid-container"><div class="grid" id="grid"></div></div>

    <div id="menu-actions" class="actions-menu">
        <button class="btn-ui" style="background:#8e44ad" onclick="doAction('fouille')">🔍 Fouiller</button>
        <button class="act btn-ui" style="background:#d35400" onclick="doAction('cache')">🍃 Se Cacher</button>
        <button class="act btn-ui" style="background:#2c3e50" onclick="doAction('repos')">💤 Se Reposer</button>
        <button class="act btn-ui" id="btn-don" style="background:#27ae60" onclick="doAction('don')">🤝 Donner</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="bite-box" class="modal"><h3 style="color:var(--red)">MORSURE !</h3><div style="font-size:60px;">🐊</div><p id="bite-msg"></p><button onclick="closeBite()" style="background:var(--red); color:white; width:100%; padding:12px; border:none; border-radius:10px;">C'EST FAIT</button></div>
<div id="loot-box" class="modal"><h3>BUTIN !</h3><div id="loot-icon" style="font-size:60px;"></div><p id="loot-name" style="font-weight:bold"></p><button onclick="confirmTurn()" style="background:black; color:white; width:100%; padding:12px; border:none; border-radius:10px;">OK</button></div>

<script>
    const synth = window.speechSynthesis;
    function speak(text) {
        synth.cancel(); 
        setTimeout(() => {
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 1.1; utter.rate = 1; utter.lang = 'fr-FR';
            synth.speak(utter);
        }, 250);
    }

    const alphabet = "ABCDEFGHIJKL";
    const openingLines = ["Bienvenue dans Lilocroco TV !"];

    let historyDistances = []; let historyActions = []; let historyLoots = [];
    let players = [
        { id: 0, name: "BLEU", picto: '👤', x: 1, y: 1, votes: 0, inv: [] },
        { id: 1, name: "ROUGE", picto: '👨‍🦰', x: 16, y: 1, votes: 0, inv: [] },
        { id: 2, name: "JAUNE", picto: '👩', x: 1, y: 12, votes: 0, inv: [] },
        { id: 3, name: "VERT", picto: '👨', x: 16, y: 12, votes: 0, inv: [] }
    ];
    let currentPlayer = 0; let turnStep = 0; let currentRange = 0;
    let crocos = []; let scenery = [];
    let isAnimating = false;

    function initIsland() {
        for(let i=1; i<=10; i++) {
            let rx = Math.floor(Math.random()*14)+2;
            let ry = Math.floor(Math.random()*10)+2;
            crocos.push({id: i, x: rx, y: ry, oldX: rx, oldY: ry, stage: 'none', pendingMove: false});
        }
        for(let i=0; i<15; i++) {
            scenery.push({x: Math.floor(Math.random()*16)+1, y: Math.floor(Math.random()*12)+1, icon: '🌴', stock: 1, fruit: '🥥'});
        }
        renderGrid();
    }

    function launchGame() {
        document.getElementById('start-overlay').style.display = 'none';
        initIsland();
        speak(openingLines[0]);
    }

    function prepMove(range) {
        if(isAnimating) return;
        currentRange = range; turnStep = 1;
        document.getElementById('deck-menu').style.opacity = "0.3";
        renderGrid();
    }

    function getDistance(x1, y1, x2, y2) { return Math.abs(x1 - x2) + Math.abs(y1 - y2); }

    function renderGrid() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const p = players[currentPlayer];

        for (let y = p.y - 3; y <= p.y + 3; y++) {
            for (let x = p.x - 3; x <= p.x + 3; x++) {
                const cell = document.createElement('div');
                if (x < 1 || x > 16 || y < 1 || y > 12) {
                    cell.className = 'cell cell-hidden';
                } else {
                    cell.className = 'cell';
                    if (x === p.x && y === p.y) cell.classList.add('cell-player');
                    
                    let dist = getDistance(p.x, p.y, x, y);
                    let isOccupiedByPlayer = players.some(pl => pl.id !== p.id && pl.x === x && pl.y === y);
                    let isReachable = (turnStep === 1 && dist <= currentRange && !isOccupiedByPlayer && !isAnimating);
                    if (isReachable) cell.classList.add('cell-reachable');

                    crocos.forEach(c => {
                        let shouldShow = false; let isBlinking = false;
                        if(c.stage === 'old' && c.oldX === x && c.oldY === y) { shouldShow = true; isBlinking = true; }
                        else if(c.stage === 'new' && c.x === x && c.y === y) { shouldShow = true; isBlinking = true; }
                        else if(c.stage === 'none' && c.x === x && c.y === y) { shouldShow = true; isBlinking = false; }

                        if(shouldShow) {
                            let cDiv = document.createElement('div');
                            cDiv.className = "croco-unit" + (isBlinking ? " croco-blink" : "");
                            cDiv.innerHTML = `🐊<div class="croco-num">${c.id}</div>`;
                            cell.appendChild(cDiv);
                        }
                    });
                    
                    players.forEach(pl => { if (pl.x === x && pl.y === y) cell.innerHTML += `<span class="pion">${pl.picto}</span>`; });
                    if (scenery.some(s => s.x === x && s.y === y && s.stock > 0)) cell.innerHTML += '🌴';
                    cell.innerHTML += `<span class="cell-coord">${alphabet[y-1]}${x}</span>`;
                    if(isReachable) cell.onclick = () => finalizeTurnMove(x, y, dist);
                }
                grid.appendChild(cell);
            }
        }
    }

    async function startTurn() {
        isAnimating = true;
        const p = players[currentPlayer];
        console.log("--- POSITIONS CROCOS ---", crocos.map(c => ({id: c.id, old: alphabet[c.oldY-1]+c.oldX, new: alphabet[c.y-1]+c.x})));

        // Animation au début du tour de CHAQUE joueur
        for (let c of crocos) {
            let inZoneOld = (Math.abs(c.oldX - p.x) <= 3 && Math.abs(c.oldY - p.y) <= 3);
            let inZoneNew = (Math.abs(c.x - p.x) <= 3 && Math.abs(c.y - p.y) <= 3);
            if(c.pendingMove && (inZoneOld || inZoneNew)) {
                c.stage = 'old'; renderGrid();
                await new Promise(r => setTimeout(r, 2000));
                c.stage = 'new'; renderGrid();
                await new Promise(r => setTimeout(r, 1000));
                c.stage = 'none';
                c.pendingMove = false;
            }
        }
        
        isAnimating = false;
        crocos.forEach(c => { c.stage = 'none'; c.pendingMove = false; });
        renderGrid();

        if(crocos.some(c => c.x === p.x && c.y === p.y)) {
            document.getElementById('bite-msg').innerText = "Morsure ! Ajoutez une blessure physique à votre défausse.";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('bite-box').style.display = 'block';
            speak("Morsure ! Ajoutez une blessure à votre défausse.");
        } else {
            speak("Joueur " + p.name + ", à vous.");
        }
        updateUI();
    }

    function moveCrocosMaster() {
        crocos.forEach(c => {
            c.oldX = c.x; c.oldY = c.y;
            let target = players.find(p => getDistance(c.x, c.y, p.x, p.y) === 1);
            if (target) {
                c.x = target.x; c.y = target.y;
                c.pendingMove = true;
            } else {
                let dirs = [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0},{x:1,y:1},{x:-1,y:-1},{x:1,y:-1},{x:-1,y:1}];
                let move = dirs[Math.floor(Math.random()*dirs.length)];
                let tx = Math.max(1, Math.min(16, c.x + move.x));
                let ty = Math.max(1, Math.min(12, c.y + move.y));
                if (!crocos.some(o => o.x === tx && o.y === ty)) {
                    c.x = tx; c.y = ty;
                    c.pendingMove = (c.x !== c.oldX || c.y !== c.oldY);
                }
            }
        });
    }

    function hasSafePath(startX, startY, endX, endY, maxSteps) {
        let queue = [{x: startX, y: startY, dist: 0}];
        let visited = new Set([`${startX},${startY}`]);
        while(queue.length > 0) {
            let curr = queue.shift();
            if(curr.x === endX && curr.y === endY) return true;
            if(curr.dist >= maxSteps) continue;
            let neighbors = [{x:curr.x+1,y:curr.y},{x:curr.x-1,y:curr.y},{x:curr.x,y:curr.y+1},{x:curr.x,y:curr.y-1}];
            for(let n of neighbors) {
                if(n.x<1||n.x>16||n.y<1||n.y>12) continue;
                let k = `${n.x},${n.y}`;
                if(!visited.has(k) && !crocos.some(c => c.x === n.x && c.y === n.y)) {
                    visited.add(k); queue.push({x: n.x, y: n.y, dist: curr.dist + 1});
                }
            }
        }
        return false;
    }

    function finalizeTurnMove(nx, ny, dist) {
        let p = players[currentPlayer];
        let pathBite = !hasSafePath(p.x, p.y, nx, ny, dist);
        p.x = nx; p.y = ny;
        if (dist === 2) speak("Fatigue. Ajoutez 1 carte Fatigue à votre défausse.");
        if (dist === 3) speak("Double Fatigue. Ajoutez 2 cartes Fatigue à votre défausse.");
        if (pathBite) {
            document.getElementById('bite-msg').innerText = "Morsure inévitable ! Prenez une blessure.";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('bite-box').style.display = 'block';
            speak("Morsure !");
        }
        turnStep = 2;
        document.getElementById('deck-menu').style.display = 'none';
        document.getElementById('menu-actions').style.display = 'grid';
        renderGrid();
    }

    function doAction(type) {
        if (type === 'fouille') {
            let p = players[currentPlayer];
            let s = scenery.find(s => s.x === p.x && s.y === p.y);
            if (s && s.stock > 0) { s.stock--; showLoot('🥥', "Récolté !"); }
            else { showLoot('💨', 'Vide'); }
        } else { confirmTurn(); }
    }

    function showLoot(icon, name) {
        document.getElementById('loot-icon').innerText = icon;
        document.getElementById('loot-name').innerText = name;
        document.getElementById('loot-box').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function confirmTurn() {
        document.getElementById('loot-box').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('menu-actions').style.display = 'none';
        document.getElementById('deck-menu').style.display = 'grid';
        document.getElementById('deck-menu').style.opacity = "1";
        currentPlayer = (currentPlayer + 1) % 4;
        turnStep = 0;
        if(currentPlayer === 0) moveCrocosMaster();
        startTurn();
    }

    function updateUI() {
        let p = players[currentPlayer];
        document.getElementById('p-header').className = `header active-${currentPlayer}`;
        document.getElementById('p-name').innerText = `JOUEUR ${p.name}`;
    }

    function closeBite() { document.getElementById('bite-box').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
