<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilocroco TV - V14 Mystery</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --yellow: #f1c40f; --green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 5px; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 450px; border: 4px solid var(--gold); border-radius: 15px; background: #1a1a1a; padding: 10px; min-height: 98vh; display: flex; flex-direction: column; }
        
        .player-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; border: 2px solid transparent; }
        .active-0 { background: rgba(52, 152, 219, 0.2); border-color: var(--blue); }
        .active-1 { background: rgba(231, 76, 60, 0.2); border-color: var(--red); }
        .active-2 { background: rgba(241, 196, 15, 0.2); border-color: var(--yellow); }
        .active-3 { background: rgba(46, 204, 113, 0.2); border-color: var(--green); }

        .inventory-bar { display: flex; justify-content: center; gap: 8px; margin: 5px 0; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 5px; font-size: 0.8rem; min-height: 30px;}

        .grid-container { background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        .cell { aspect-ratio: 1/1; background: #1c2833; border-radius: 4px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; font-size: 1rem; position: relative; border: 1px solid #2c3e50; padding: 1px; }
        .cell-hidden { visibility: hidden; }
        .cell-player { border: 2px solid white; background: #234d20 !important; }

        .pion { font-size: 1.2rem; z-index: 10; }
        .case-element { margin: 1px; display: inline-block; }

        .actions-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        button { padding: 15px 5px; border-radius: 8px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; }
        .btn-fouille { background: #8e44ad; } .btn-cache { background: #d35400; }
        .btn-repos { background: #2c3e50; } .btn-don { background: #27ae60; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 25px; border-radius: 20px; text-align: center; z-index: 100; width: 280px; box-shadow: 0 0 100px black; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 90; }
        .cell-coord { position: absolute; bottom: 1px; right: 2px; font-size: 0.4rem; color: #555; pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="p-header" class="player-bar active-0">
        <div>
            <div id="p-name" style="font-weight:bold;">JOUEUR BLEU</div>
            <div id="p-hp">❤️❤️❤️</div>
        </div>
        <div id="p-votes" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">0</div>
    </div>

    <div class="inventory-bar" id="p-inv">🎒 Sac vide</div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <div id="menu-actions" class="actions-menu">
        <button class="btn-fouille" onclick="doAction('fouille')">🔍 Fouiller</button>
        <button class="btn-cache" onclick="doAction('cache')">🍃 Se Cacher</button>
        <button class="btn-repos" onclick="doAction('repos')">💤 Se Reposer</button>
        <button class="btn-don" id="btn-don" onclick="doAction('don')">🤝 Donner</button>
    </div>
    <div id="action-history" style="font-size: 0.6rem; color: #666; margin-top: 10px; height: 50px; overflow-y: auto; background: #000; padding: 5px;"></div>
</div>

<div class="overlay" id="overlay"></div>
<div id="bite-box" class="modal"><h3 style="color:var(--red)">MORSURE !</h3><div style="font-size:60px;">🐊</div><p>Un croco vous a mordu au réveil. -1 PV.</p><button onclick="closeBite()" style="background:var(--red); color:white; width:100%; padding:12px; border:none; border-radius:10px;">OK</button></div>
<div id="loot-box" class="modal"><h3>BUTIN !</h3><div id="loot-icon" style="font-size:60px;">🥥</div><p id="loot-name" style="font-weight:bold"></p><p id="loot-info" style="font-size:0.8rem"></p><button onclick="confirmTurn('Récolte')" style="background:black; color:white; width:100%; padding:12px; border:none; border-radius:10px;">AJOUTER AU SAC</button></div>

<script>
    const alphabet = "ABCDEFGHIJKL";
    let players = [
        { id: 0, name: "BLEU", picto: '👤', x: 1, y: 1, votes: 0, hp: 3, stealth: false, inv: [] },
        { id: 1, name: "ROUGE", picto: '👨‍🦰', x: 16, y: 1, votes: 0, hp: 3, stealth: false, inv: [] },
        { id: 2, name: "JAUNE", picto: '👩', x: 1, y: 12, votes: 0, hp: 3, stealth: false, inv: [] },
        { id: 3, name: "VERT", picto: '👨', x: 16, y: 12, votes: 0, hp: 3, stealth: false, inv: [] }
    ];
    let currentPlayer = 0;
    let turnStep = 0; 
    let worldSize = { w: 16, h: 12 };
    let crocos = [];
    let scenery = [];
    let hiddenItems = [];

    function initIsland() {
        const missions = ['🗿 Totem', '📦 Caisse', '🍶 Rhum', '🏺 Vase', '🔧 Outil', '🗺️ Carte'];
        for(let x=1; x<=16; x++) {
            for(let y=1; y<=12; y++) {
                if((x==1 && y==1) || (x==16 && y==1) || (x==1 && y==12) || (x==16 && y==12)) continue;
                let rand = Math.random();
                // Crocos
                if(rand < 0.20) crocos.push({x:x, y:y});
                // Arbres
                else if(rand < 0.35) {
                    scenery.push({x:x, y:y, icon: Math.random() > 0.5 ? '🌴' : '🌿', stock: Math.floor(Math.random()*3)+1, fruit: Math.random() > 0.5 ? '🥥' : '🍌'});
                }
                // Objets de mission (33% des cases restantes environ)
                else if(rand < 0.68) {
                    hiddenItems.push({x:x, y:y, name: missions[Math.floor(Math.random()*missions.length)]});
                }
            }
        }
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const p = players[currentPlayer];

        for (let y = p.y - 3; y <= p.y + 3; y++) {
            for (let x = p.x - 3; x <= p.x + 3; x++) {
                const cell = document.createElement('div');
                if (x < 1 || x > worldSize.w || y < 1 || y > worldSize.h) {
                    cell.className = 'cell cell-hidden';
                } else {
                    cell.className = 'cell';
                    if (x === p.x && y === p.y) cell.classList.add('cell-player');
                    
                    let s = scenery.find(s => s.x === x && s.y === y);
                    if (s) {
                        let tree = document.createElement('span');
                        tree.className = 'case-element'; tree.innerHTML = s.stock > 0 ? s.icon : '🍂';
                        cell.appendChild(tree);
                    }
                    if (crocos.some(c => c.x === x && c.y === y)) {
                        let cIcon = document.createElement('span');
                        cIcon.className = 'case-element'; cIcon.innerHTML = '🐊';
                        cell.appendChild(cIcon);
                    }
                    players.forEach(pl => {
                        if (pl.x === x && pl.y === y) {
                            let pion = document.createElement('span');
                            pion.className = `pion case-element ${pl.stealth ? 'is-stealth' : ''}`;
                            pion.innerHTML = pl.picto;
                            cell.appendChild(pion);
                        }
                    });

                    cell.innerHTML += `<span class="cell-coord">${alphabet[y-1]}${x}</span>`;
                    if(turnStep === 0) {
                        (function(tx, ty) { cell.onclick = function() { moveTo(tx, ty); }; })(x, y);
                    }
                }
                grid.appendChild(cell);
            }
        }
    }

    function moveTo(nx, ny) {
        players[currentPlayer].x = nx;
        players[currentPlayer].stealth = false;
        players[currentPlayer].y = ny;
        turnStep = 1;
        document.getElementById('menu-actions').style.display = 'grid';
        renderGrid();
    }

    function doAction(type) {
        let p = players[currentPlayer];
        if (type === 'fouille') {
            document.getElementById('overlay').style.display = 'block';
            let tree = scenery.find(s => s.x === p.x && s.y === p.y);
            let item = hiddenItems.find(i => i.x === p.x && i.y === p.y);

            if (tree && tree.stock > 0) {
                tree.stock--;
                let res = tree.fruit;
                p.inv.push(res);
                showLoot(res, (tree.fruit === '🥥' ? 'Noix de Coco' : 'Banane'), "Stock de l'arbre : " + tree.stock);
            } else if (item) {
                p.inv.push(item.name);
                showLoot('🎁', item.name, "Objet de mission trouvé dans le sol !");
                hiddenItems = hiddenItems.filter(i => i !== item);
            } else {
                document.getElementById('loot-icon').innerText = '💨';
                document.getElementById('loot-name').innerText = 'VIDE';
                document.getElementById('loot-info').innerText = 'Rien ici, essayez ailleurs.';
                document.getElementById('loot-box').style.display = 'block';
            }
        } else { confirmTurn(type); }
    }

    function showLoot(icon, name, info) {
        document.getElementById('loot-icon').innerText = icon;
        document.getElementById('loot-name').innerText = name.toUpperCase();
        document.getElementById('loot-info').innerText = info;
        document.getElementById('loot-box').style.display = 'block';
    }

    function confirmTurn(msg) {
        document.getElementById('loot-box').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        let p = players[currentPlayer];
        document.getElementById('action-history').innerHTML = `<div>[${p.name}] ${msg}</div>` + document.getElementById('action-history').innerHTML;
        document.getElementById('menu-actions').style.display = 'none';
        currentPlayer = (currentPlayer + 1) % 4;
        if(currentPlayer === 0) moveCrocos();
        startTurn();
    }

    function startTurn() {
        turnStep = 0;
        let p = players[currentPlayer];
        if(crocos.some(c => c.x === p.x && c.y === p.y) && !p.stealth) {
            p.hp--;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('bite-box').style.display = 'block';
        }
        updateUI();
        renderGrid();
    }

    function moveCrocos() {
        crocos.forEach(c => {
            let vis = players.filter(p => !p.stealth);
            if(vis.length === 0) return;
            let target = vis.reduce((prev, curr) => {
                let dP = Math.abs(c.x - prev.x) + Math.abs(c.y - prev.y);
                let dC = Math.abs(c.x - curr.x) + Math.abs(c.y - curr.y);
                return dC < dP ? curr : prev;
            });
            let nX = c.x, nY = c.y;
            if (c.x < target.x) nX++; else if (c.x > target.x) nX--;
            else if (c.y < target.y) nY++; else if (c.y > target.y) nY--;
            if (!crocos.some(o => o !== c && o.x === nX && o.y === nY) && !players.some(p => p.stealth && p.x === nX && p.y === nY)) {
                c.x = nX; c.y = nY;
            }
        });
    }

    function updateUI() {
        let p = players[currentPlayer];
        document.getElementById('p-header').className = `player-bar active-${currentPlayer}`;
        document.getElementById('p-name').innerText = `JOUEUR ${p.name}`;
        document.getElementById('p-hp').innerText = "❤️".repeat(Math.max(0, p.hp)) + "🖤".repeat(Math.max(0, 3-p.hp));
        document.getElementById('p-inv').innerText = p.inv.length > 0 ? "🎒 " + p.inv.join(' | ') : "🎒 Sac vide";
    }

    function closeBite() { document.getElementById('bite-box').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

    window.onload = () => { initIsland(); renderGrid(); };
</script>
</body>
</html>
