<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilocroco TV - V10 Survie</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --yellow: #f1c40f; --green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 5px; display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 450px; border: 4px solid var(--gold); border-radius: 15px; background: #1a1a1a; padding: 10px; min-height: 95vh; display: flex; flex-direction: column; }
        
        .player-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 2px solid transparent; }
        .active-0 { background: rgba(52, 152, 219, 0.2); border-color: var(--blue); }
        .active-1 { background: rgba(231, 76, 60, 0.2); border-color: var(--red); }
        .active-2 { background: rgba(241, 196, 15, 0.2); border-color: var(--yellow); }
        .active-3 { background: rgba(46, 204, 113, 0.2); border-color: var(--green); }

        .hp-bar { font-size: 0.9rem; letter-spacing: 2px; }

        .grid-container { background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        .cell { aspect-ratio: 1/1; background: #1c2833; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; position: relative; border: 1px solid #2c3e50; }
        .cell-hidden { visibility: hidden; }

        .pion { width: 65%; height: 65%; border-radius: 50%; border: 2px solid white; z-index: 5; position: absolute; }
        .p-0 { background: var(--blue); } .p-1 { background: var(--red); }
        .p-2 { background: var(--yellow); } .p-3 { background: var(--green); }
        .cell-player { border: 2px solid white; background: #234d20 !important; }

        .cell-coord { position: absolute; bottom: 1px; right: 2px; font-size: 0.45rem; color: #566573; z-index: 1; }

        .actions-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        button { padding: 15px 5px; border-radius: 8px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; }
        .btn-fouille { background: #8e44ad; } .btn-cache { background: #d35400; }
        .btn-repos { background: #2c3e50; } .btn-don { background: #27ae60; }

        .log-section { flex-grow: 1; background: #000; border-radius: 8px; padding: 8px; border: 1px solid #333; font-family: monospace; font-size: 0.65rem; overflow-y: auto; max-height: 80px; margin-top: 8px; color: #999; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 25px; border-radius: 20px; text-align: center; z-index: 100; width: 280px; box-shadow: 0 0 100px black; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 90; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="p-header" class="player-bar active-0">
        <div>
            <div id="p-name" style="font-weight:bold;">JOUEUR BLEU</div>
            <div id="p-hp" class="hp-bar">❤️❤️❤️</div>
        </div>
        <div id="p-votes" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">0</div>
    </div>

    <div style="text-align:center; font-size:0.7rem; margin-bottom:5px; color:#f1c40f;" id="instruction">
        🌊 DÉPLACEZ VOTRE PION
    </div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <div id="menu-actions" class="actions-menu">
        <button class="btn-fouille" onclick="doAction('fouille')">🔍 Fouiller</button>
        <button class="btn-cache" onclick="doAction('cache')">🍃 Se Cacher</button>
        <button class="btn-repos" onclick="doAction('repos')">💤 Se Reposer</button>
        <button class="btn-don" id="btn-don" onclick="doAction('don')">🤝 Donner</button>
    </div>

    <div class="log-section" id="action-history"></div>
</div>

<div class="overlay" id="overlay"></div>
<div id="loot-box" class="modal">
    <h3 style="margin:0">OBJET TROUVÉ !</h3>
    <div id="loot-icon" style="font-size:60px; margin:10px 0;">🥥</div>
    <div id="loot-name" style="font-weight:bold;">NOIX DE COCO</div>
    <p id="loot-stock" style="font-size:0.8rem; color:#666;">Il en reste encore sur l'arbre.</p>
    <button onclick="confirmTurn('Objet récolté')" style="margin-top:20px; background:black; color:white; width:100%; padding:12px; border-radius:10px; border:none;">PRENDRE</button>
</div>
<div id="empty-box" class="modal">
    <h3 style="margin:0">RIEN ICI...</h3>
    <div style="font-size:50px; margin:10px 0;">💨</div>
    <p id="empty-msg">Cette zone est vide ou épuisée.</p>
    <button onclick="confirmTurn('Fouille vide')" style="margin-top:15px; background:#555; color:white; width:100%; padding:10px; border-radius:10px; border:none;">CONTINUER</button>
</div>
<div id="bite-box" class="modal" style="border: 4px solid var(--red);">
    <h3 style="color:var(--red)">MORSURE !</h3>
    <div style="font-size:60px; margin:10px 0;">🐊</div>
    <p>Un crocodile est sur votre case. Vous perdez 1 point de vie !</p>
    <button onclick="closeBite()" style="margin-top:15px; background:var(--red); color:white; width:100%; padding:10px; border-radius:10px; border:none;">AÏE !</button>
</div>

<script>
    const alphabet = "ABCDEFGHIJKL";
    var players = [
        { id: 0, name: "BLEU", x: 1, y: 1, votes: 0, hp: 3, pendingBite: false },
        { id: 1, name: "ROUGE", x: 16, y: 1, votes: 0, hp: 3, pendingBite: false },
        { id: 2, name: "JAUNE", x: 1, y: 12, votes: 0, hp: 3, pendingBite: false },
        { id: 3, name: "VERT", x: 16, y: 12, votes: 0, hp: 3, pendingBite: false }
    ];
    var currentPlayer = 0;
    var turnStep = 0; 
    var worldSize = { w: 16, h: 12 };
    var crocos = [];
    var scenery = []; // Bananiers/Cocotiers avec stock

    function initIsland() {
        for(let x=1; x<=16; x++) {
            for(let y=1; y<=12; y++) {
                // Ne pas mettre de crocos/arbres sur les spawns des joueurs
                if((x==1 && y==1) || (x==16 && y==1) || (x==1 && y==12) || (x==16 && y==12)) continue;

                let rand = Math.random();
                if(rand < 0.30) { 
                    crocos.push({x:x, y:y}); 
                } else if(rand < 0.45) { 
                    let type = Math.random() > 0.5 ? 'palm' : 'banana';
                    scenery.push({
                        x:x, y:y, 
                        icon: type === 'palm' ? '🌴' : '🌿',
                        fruit: type === 'palm' ? '🥥' : '🍌',
                        stock: Math.floor(Math.random() * 3) + 1
                    }); 
                }
            }
        }
    }

    function renderGrid() {
        var grid = document.getElementById('grid');
        grid.innerHTML = '';
        var p = players[currentPlayer];

        for (var y = p.y - 3; y <= p.y + 3; y++) {
            for (var x = p.x - 3; x <= p.x + 3; x++) {
                var cell = document.createElement('div');
                if (x < 1 || x > worldSize.w || y < 1 || y > worldSize.h) {
                    cell.className = 'cell cell-hidden';
                } else {
                    cell.className = 'cell';
                    if (x === p.x && y === p.y) cell.classList.add('cell-player');
                    
                    if(crocos.some(c => c.x === x && c.y === y)) cell.innerHTML = '🐊';
                    let tree = scenery.find(s => s.x === x && s.y === y);
                    if(tree) cell.innerHTML = (tree.stock > 0) ? tree.icon : '🍂';
                    
                    for(var j=0; j<players.length; j++) {
                        if(players[j].x === x && players[j].y === y) {
                            var pion = document.createElement('div');
                            pion.className = 'pion p-' + j;
                            cell.appendChild(pion);
                        }
                    }
                    cell.innerHTML += `<span class="cell-coord">${alphabet[y-1]}${x}</span>`;
                    if(turnStep === 0) {
                        (function(cx, cy) { cell.onclick = function() { moveTo(cx, cy); }; })(x, y);
                    }
                }
                grid.appendChild(cell);
            }
        }
    }

    function moveTo(x, y) {
        players[currentPlayer].x = x;
        players[currentPlayer].y = y;
        turnStep = 1;
        document.getElementById('menu-actions').style.display = 'grid';
        renderGrid();
    }

    function doAction(type) {
        var p = players[currentPlayer];
        document.getElementById('overlay').style.display = 'block';

        if(type === 'fouille') {
            var tree = scenery.find(s => s.x === p.x && s.y === p.y);
            if(tree && tree.stock > 0) {
                tree.stock--;
                document.getElementById('loot-icon').innerText = tree.fruit;
                document.getElementById('loot-name').innerText = tree.fruit === '🥥' ? "NOIX DE COCO" : "BANANE";
                document.getElementById('loot-stock').innerText = "Stock restant : " + tree.stock;
                document.getElementById('loot-box').style.display = 'block';
            } else {
                document.getElementById('empty-msg').innerText = tree ? "Cet arbre est épuisé." : "Rien à récolter ici.";
                document.getElementById('empty-box').style.display = 'block';
            }
        } else {
            confirmTurn(type);
        }
    }

    function confirmTurn(msg) {
        document.getElementById('loot-box').style.display = 'none';
        document.getElementById('empty-box').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        
        var p = players[currentPlayer];
        var history = document.getElementById('action-history');
        history.innerHTML = "<div>[" + p.name + "] " + msg + "</div>" + history.innerHTML;

        document.getElementById('menu-actions').style.display = 'none';
        currentPlayer++;

        if(currentPlayer >= 4) {
            currentPlayer = 0;
            moveCrocos();
        }
        startNextTurn();
    }

    function startNextTurn() {
        turnStep = 0;
        var p = players[currentPlayer];
        
        // Verifier morsure pendante
        if(p.pendingBite || crocos.some(c => c.x === p.x && c.y === p.y)) {
            p.hp--;
            p.pendingBite = false;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('bite-box').style.display = 'block';
        }

        updateUI();
        renderGrid();
    }

    function closeBite() {
        document.getElementById('bite-box').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function moveCrocos() {
        crocos.forEach(c => {
            let target = players[Math.floor(Math.random()*4)]; // Cible aléatoire ou proche
            let nextX = c.x, nextY = c.y;

            if(c.x < target.x) nextX++; else if(c.x > target.x) nextX--;
            else if(c.y < target.y) nextY++; else if(c.y > target.y) nextY--;

            // Collision entre crocos
            if(!crocos.some(other => other !== c && other.x === nextX && other.y === nextY)) {
                c.x = nextX; c.y = nextY;
                // Si un croco arrive sur un joueur
                players.forEach(p => {
                    if(p.x === c.x && p.y === c.y) p.pendingBite = true;
                });
            }
        });
    }

    function updateUI() {
        var p = players[currentPlayer];
        var head = document.getElementById('p-header');
        head.className = "player-bar active-" + currentPlayer;
        document.getElementById('p-name').innerText = "JOUEUR " + p.name;
        document.getElementById('p-votes').innerText = p.votes;
        document.getElementById('p-hp').innerText = "❤️".repeat(Math.max(0, p.hp)) + "🖤".repeat(Math.max(0, 3-p.hp));
    }

    window.onload = function() { initIsland(); renderGrid(); };
</script>
</body>
</html>
