<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lilocroco TV - V17.2 Final Fix</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --yellow: #f1c40f; --green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 5px; display: flex; justify-content: center; }

        /* Overlay de démarrage pour autoriser le son */
        #start-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #start-btn { padding: 20px 40px; font-size: 1.5rem; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; }

        .app-container { width: 100%; max-width: 450px; border: 4px solid var(--gold); border-radius: 15px; background: #1a1a1a; padding: 10px; min-height: 98vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 2px solid transparent; }
        .active-0 { background: rgba(52, 152, 219, 0.2); border-color: var(--blue); }
        .active-1 { background: rgba(231, 76, 60, 0.2); border-color: var(--red); }
        .active-2 { background: rgba(241, 196, 15, 0.2); border-color: var(--yellow); }
        .active-3 { background: rgba(46, 204, 113, 0.2); border-color: var(--green); }

        .inventory-bar { display: flex; justify-content: center; gap: 8px; margin: 5px 0; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 5px; font-size: 0.75rem; min-height: 30px; border: 1px dashed #444;}

        .grid-container { background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        .cell { aspect-ratio: 1/1; background: #1c2833; border-radius: 4px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; font-size: 1.1rem; position: relative; border: 1px solid #2c3e50; }
        .cell-hidden { visibility: hidden; }
        .cell-player { border: 2px solid white; background: #234d20 !important; }

        .pion { font-size: 1.3rem; z-index: 10; transition: 0.3s; }
        .is-stealth { opacity: 0.3; filter: grayscale(1); transform: scale(0.8); }

        .btn-mic { width: 100%; background: #e74c3c; color: white; border: none; border-radius: 8px; padding: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-mic.listening { animation: pulse 1s infinite; background: #ff4757; }

        .actions-menu { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        button.act { padding: 15px 5px; border-radius: 8px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 25px; border-radius: 20px; text-align: center; z-index: 100; width: 280px; box-shadow: 0 0 100px black; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 90; }
        .cell-coord { position: absolute; bottom: 1px; right: 2px; font-size: 0.4rem; color: #555; pointer-events: none; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color:var(--gold)">LILOCROCO TV</h1>
    <p style="margin-bottom:30px">Prêt pour le direct ?</p>
    <button id="start-btn" onclick="launchGame()">LANCER LE SHOW</button>
</div>

<div class="app-container">
    <div id="p-header" class="header active-0">
        <div><div id="p-name" style="font-weight:bold;">JOUEUR BLEU</div><div id="p-hp">❤️❤️❤️</div></div>
        <div id="p-votes" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">0</div>
    </div>

    <div class="inventory-bar" id="p-inv">🎒 Sac vide</div>
    <button id="mic-btn" class="btn-mic" onclick="startVoice()">🎤 PARLER À L'ANIMATEUR</button>

    <div class="grid-container"><div class="grid" id="grid"></div></div>

    <div id="menu-actions" class="actions-menu">
        <button class="act" style="background:#8e44ad" onclick="doAction('fouille')">🔍 Fouiller</button>
        <button class="act" style="background:#d35400" onclick="doAction('cache')">🍃 Se Cacher</button>
        <button class="act" style="background:#2c3e50" onclick="doAction('repos')">💤 Se Reposer</button>
        <button class="act" id="btn-don" style="background:#27ae60" onclick="doAction('don')">🤝 Donner</button>
    </div>
    <div id="action-history" style="font-size: 0.6rem; color: #666; margin-top: 10px; height: 40px; overflow-y: auto; background: #000; padding: 5px;"></div>
</div>

<div class="overlay" id="overlay"></div>
<div id="bite-box" class="modal"><h3 style="color:var(--red)">MORSURE !</h3><div style="font-size:60px;">🐊</div><p>Un croco vous a mordu ! -1 PV.</p><button onclick="closeBite()" style="background:var(--red); color:white; width:100%; padding:12px; border:none; border-radius:10px;">OK</button></div>
<div id="loot-box" class="modal"><h3>BUTIN !</h3><div id="loot-icon" style="font-size:60px;"></div><p id="loot-name" style="font-weight:bold"></p><p id="loot-info" style="font-size:0.8rem"></p><button onclick="confirmTurn('Récolte')" style="background:black; color:white; width:100%; padding:12px; border:none; border-radius:10px;">OK</button></div>

<script>
    // --- MOTEUR VOCAL ---
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.pitch = 1.1; utter.rate = 1;
        synth.speak(utter);
    }

    function startVoice() {
        if (!recognition) return alert("Micro non supporté.");
        recognition.start();
        document.getElementById('mic-btn').classList.add('listening');
        document.getElementById('mic-btn').innerText = "JE VOUS ÉCOUTE...";
    }

    if (recognition) {
        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            document.getElementById('mic-btn').classList.remove('listening');
            document.getElementById('mic-btn').innerText = "🎤 PARLER À L'ANIMATEUR";
            if (turnStep === 1) {
                if (cmd.includes("fouille")) doAction('fouille');
                else if (cmd.includes("cache")) doAction('cache');
                else if (cmd.includes("repose") || cmd.includes("repos")) doAction('repos');
                else if (cmd.includes("donne")) doAction('don');
            }
        };
    }

    // --- LOGIQUE JEU ---
    const alphabet = "ABCDEFGHIJKL";
    const openingLines = [
        "Bienvenue dans Lilocroco TV ! Quatre candidats, une île, et des mâchoires affamées. Que le meilleur gagne !",
        "Ici la régie ! Les caméras sont prêtes, le public est bouillant. Joueur Bleu, ouvrez le bal !",
        "Lilocroco TV : l'émission où chaque pas peut être le dernier ! Qui sera la star de l'audimat aujourd'hui ?",
        "Le soleil tape fort sur l'île mondiale ! Naufragés, préparez-vous, le direct commence maintenant !",
        "3, 2, 1... Antenne ! Bienvenue sur l'île la plus dangereuse de la planète. Montrez-nous de quoi vous êtes capables !",
        "Messieurs dames, préparez vos mouchoirs ou vos pansements ! Lilocroco TV lance son grand défi du jour !",
        "Les crocos n'ont pas déjeuné et nos candidats sont en place. Quel spectacle magnifique nous attend !",
        "Avis à tous les téléspectateurs : ne reproduisez pas ça chez vous ! Joueur Bleu, à vous l'honneur !",
        "L'île aux crocodiles vous ouvre ses portes... Sortirez-vous vivants de ce tournage de l'extrême ?",
        "Silence plateau ! On tourne ! Joueur Bleu, le destin de votre équipe est entre vos mains. Avancez !"
    ];

    let players = [
        { id: 0, name: "BLEU", picto: '👤', x: 1, y: 1, votes: 0, hp: 3, stealth: false, inv: [] },
        { id: 1, name: "ROUGE", picto: '👨‍🦰', x: 16, y: 1, votes: 0, hp: 3, stealth: false, inv: [] },
        { id: 2, name: "JAUNE", picto: '👩', x: 1, y: 12, votes: 0, hp: 3, stealth: false, inv: [] },
        { id: 3, name: "VERT", picto: '👨', x: 16, y: 12, votes: 0, hp: 3, stealth: false, inv: [] }
    ];
    let currentPlayer = 0; let turnStep = 0; 
    let worldSize = { w: 16, h: 12 };
    let crocos = []; let scenery = []; let hiddenItems = [];

    function initIsland() {
        const missions = ['🗿 Totem', '📦 Caisse', '🍶 Rhum', '🏺 Vase'];
        for(let x=1; x<=16; x++) {
            for(let y=1; y<=12; y++) {
                if((x==1 && y==1) || (x==16 && y==1) || (x==1 && y==12) || (x==16 && y==12)) continue;
                let rand = Math.random();
                if(rand < 0.25) crocos.push({x:x, y:y});
                else if(rand < 0.40) scenery.push({x:x, y:y, icon: Math.random() > 0.5 ? '🌴' : '🌿', stock: Math.floor(Math.random()*3)+1, fruit: Math.random() > 0.5 ? '🥥' : '🍌'});
                else if(rand < 0.60) hiddenItems.push({x:x, y:y, name: missions[Math.floor(Math.random()*missions.length)]});
            }
        }
        renderGrid();
    }

    // Fonction de lancement
    function launchGame() {
        document.getElementById('start-overlay').style.display = 'none';
        initIsland();
        const randomOpening = openingLines[Math.floor(Math.random() * openingLines.length)];
        speak(randomOpening);
    }

    function renderGrid() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const p = players[currentPlayer];
        for (let y = p.y - 3; y <= p.y + 3; y++) {
            for (let x = p.x - 3; x <= p.x + 3; x++) {
                const cell = document.createElement('div');
                if (x < 1 || x > worldSize.w || y < 1 || y > worldSize.h) cell.className = 'cell cell-hidden';
                else {
                    cell.className = 'cell' + (x === p.x && y === p.y ? ' cell-player' : '');
                    if (crocos.some(c => c.x === x && c.y === y)) cell.innerHTML = '🐊';
                    players.forEach(pl => { if (pl.x === x && pl.y === y) cell.innerHTML += `<span class="pion ${pl.stealth ? 'is-stealth' : ''}">${pl.picto}</span>`; });
                    let s = scenery.find(s => s.x === x && s.y === y);
                    if (s) cell.innerHTML += `<span class="case-element">${s.stock > 0 ? s.icon : '🍂'}</span>`;
                    cell.innerHTML += `<span class="cell-coord">${alphabet[y-1]}${x}</span>`;
                    if(turnStep === 0) {
                        (function(tx, ty) { cell.onclick = () => { 
                            p.x = tx; p.y = ty; p.stealth = false; turnStep = 1;
                            document.getElementById('menu-actions').style.display = 'grid';
                            speak("Action ?"); renderGrid();
                        }; })(x, y);
                    }
                }
                grid.appendChild(cell);
            }
        }
    }

    function doAction(type) {
        let p = players[currentPlayer];
        if (type === 'cache') { p.stealth = true; speak("Furtivité activée !"); confirmTurn('Caché'); }
        else if (type === 'fouille') {
            document.getElementById('overlay').style.display = 'block';
            let tree = scenery.find(s => s.x === p.x && s.y === p.y);
            let item = hiddenItems.find(i => i.x === p.x && i.y === p.y);
            if (tree && tree.stock > 0) {
                tree.stock--; p.inv.push(tree.fruit); speak("Trouvé !");
                showLoot(tree.fruit, tree.fruit === '🥥' ? 'Noix de Coco' : 'Banane', "Stock : " + tree.stock);
            } else if (item) {
                p.inv.push(item.name); speak("Incroyable trouvaille !");
                showLoot('🎁', item.name, "Objet de mission !");
                hiddenItems = hiddenItems.filter(i => i !== item);
            } else { speak("Rien du tout !"); showLoot('💨', 'VIDE', 'Rien ici...'); }
        } else { confirmTurn(type); }
    }

    function showLoot(icon, name, info) {
        document.getElementById('loot-icon').innerText = icon;
        document.getElementById('loot-name').innerText = name;
        document.getElementById('loot-info').innerText = info;
        document.getElementById('loot-box').style.display = 'block';
    }

    function confirmTurn(msg) {
        document.getElementById('loot-box').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('menu-actions').style.display = 'none';
        let p = players[currentPlayer];
        document.getElementById('action-history').innerHTML = `<div>[${p.name}] ${msg}</div>` + document.getElementById('action-history').innerHTML;
        currentPlayer = (currentPlayer + 1) % 4;
        if(currentPlayer === 0) moveCrocos();
        startTurn();
    }

    function startTurn() {
        turnStep = 0; let p = players[currentPlayer];
        if(crocos.some(c => c.x === p.x && c.y === p.y) && !p.stealth) {
            p.hp--; speak("Attention ! Une morsure !");
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('bite-box').style.display = 'block';
        } else {
            speak(`Joueur ${p.name}, à vous.`);
        }
        updateUI(); renderGrid();
    }

    function moveCrocos() {
        crocos.forEach(c => {
            let targets = players.filter(p => !p.stealth);
            if(targets.length === 0) return;
            let target = targets.reduce((prev, curr) => (Math.abs(c.x - curr.x) + Math.abs(c.y - curr.y) < Math.abs(c.x - prev.x) + Math.abs(c.y - prev.y)) ? curr : prev);
            let nX = c.x, nY = c.y;
            if (c.x < target.x) nX++; else if (c.x > target.x) nX--;
            else if (c.y < target.y) nY++; else if (c.y > target.y) nY--;
            if (!players.some(p => p.stealth && p.x === nX && p.y === nY) && !crocos.some(o => o !== c && o.x === nX && o.y === nY)) {
                c.x = nX; c.y = nY;
            }
        });
    }

    function updateUI() {
        let p = players[currentPlayer];
        document.getElementById('p-header').className = `header active-${currentPlayer}`;
        document.getElementById('p-name').innerText = `JOUEUR ${p.name}`;
        document.getElementById('p-hp').innerText = "❤️".repeat(Math.max(0, p.hp)) + "🖤".repeat(Math.max(0, 3-p.hp));
        document.getElementById('p-inv').innerText = p.inv.length > 0 ? "🎒 " + p.inv.join(' | ') : "🎒 Sac vide";
    }

    function closeBite() { document.getElementById('bite-box').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
