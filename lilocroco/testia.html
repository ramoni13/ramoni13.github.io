<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNJ Intelligent - WebLLM & Voice</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #e94560;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        #status {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 20px;
            font-style: italic;
        }

        #chat-window {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            min-height: 120px;
            border: 1px solid #333;
        }

        #npc-response {
            font-size: 1.2em;
            line-height: 1.5;
            color: #00d2ff;
        }

        #player-input-display {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 10px;
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Barre de progression du chargement */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Le Gardien du Portail</h1>
        
        <div id="status">Initialisation du moteur WebGPU...</div>
        
        <div class="progress-container" id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="chat-window">
            <div id="npc-response">Veuillez patienter, je me réveille doucement...</div>
            <div id="player-input-display"></div>
        </div>

        <div class="controls">
            <button id="talk-btn" disabled>
                🎤 Cliquez pour Parler
            </button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://jspm.dev/@mlc-ai/webllm";

        const statusLabel = document.getElementById("status");
        const progressBar = document.getElementById("progress-bar");
        const progressContainer = document.getElementById("progress-container");
        const npcResponse = document.getElementById("npc-response");
        const playerDisplay = document.getElementById("player-input-display");
        const talkBtn = document.getElementById("talk-btn");

        let engine;
        // Modèle Qwen 0.5B : Très léger (~400Mo), parfait pour du JS pur
        const modelId = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";

        // --- 1. CONFIGURATION DU MICRO (SPEECH TO TEXT) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.interimResults = false;
        } else {
            statusLabel.innerText = "Désolé, votre navigateur ne supporte pas la reconnaissance vocale.";
        }

        // --- 2. FONCTION DE VOIX (TEXT TO SPEECH) ---
        function vocaliser(texte) {
            window.speechSynthesis.cancel(); // Stoppe la voix en cours
            const utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang = 'fr-FR';
            utterance.pitch = 0.8; // Voix un peu plus grave
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // --- 3. CHARGEMENT DE L'IA ---
        async function loadAI() {
            progressContainer.style.display = "block";
            try {
                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (report) => {
                        statusLabel.innerText = report.text;
                        // Extraction du pourcentage si disponible dans le texte du rapport
                        const match = report.text.match(/\[(\d+)\/(\d+)\]/);
                        if (match) {
                            const p = (parseInt(match[1]) / parseInt(match[2])) * 100;
                            progressBar.style.width = p + "%";
                        }
                    }
                });
                
                statusLabel.innerText = "IA prête localement sur votre GPU !";
                progressContainer.style.display = "none";
                npcResponse.innerText = "Je vous écoute, étranger. Que voulez-vous ?";
                vocaliser("Je vous écoute, étranger. Que voulez-vous ?");
                talkBtn.disabled = false;
            } catch (err) {
                statusLabel.innerText = "Erreur fatale : WebGPU n'est pas supporté ou activé.";
                console.error(err);
            }
        }

        // --- 4. GESTION DU CLIC ET DU MICRO ---
        talkBtn.onclick = () => {
            if (!recognition) return;
            
            talkBtn.disabled = true;
            statusLabel.innerText = "Micro activé... Parlez maintenant.";
            recognition.start();
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            playerDisplay.innerText = "Vous : " + transcript;
            statusLabel.innerText = "Le PNJ réfléchit...";
            npcResponse.innerText = "......";

            // Envoi au modèle IA
            const messages = [
                { role: "system", content: "Tu es un gardien mystérieux. Réponds de façon courte et un peu énigmatique en français." },
                { role: "user", content: transcript }
            ];

            const chunks = await engine.chat.completions.create({ messages });
            const aiReply = chunks.choices[0].message.content;

            // Affichage et Parole
            npcResponse.innerText = aiReply;
            vocaliser(aiReply);
            
            statusLabel.innerText = "Prêt pour la suite.";
            talkBtn.disabled = false;
        };

        recognition.onerror = (event) => {
            statusLabel.innerText = "Erreur micro : " + event.error;
            talkBtn.disabled = false;
        };

        // Lancement au chargement de la page
        loadAI();

    </script>
</body>
</html>
